<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot Control</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* Top Section: Real-time Markets */
        #markets-container {
            width: 100%;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        
        /* Bottom Section: Split into Left (Control) and Right (Stats) */
        .bottom-section {
            display: flex;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }
        
        .control-panel {
            flex: 0 0 300px;
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }

        #portfolio-container {
            flex: 1;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            min-width: 300px;
            overflow-x: auto;
        }
        
        #trades-container {
            flex: 1;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            min-width: 300px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .bottom-section {
                flex-direction: column;
            }
            .control-panel {
                flex: 1;
                width: 100%;
                box-sizing: border-box;
            }
            #trades-container {
                width: 100%;
                box-sizing: border-box;
            }
        }

        h1, h3 {
            margin-top: 0;
            color: #333;
        }
        h1 { margin-bottom: 1.5rem; }
        h3 { margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.5rem; }

        .status {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .status.running {
            color: #10b981;
        }
        .status.stopped {
            color: #ef4444;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 1rem;
        }
        #toggleBtn {
            font-weight: bold;
        }
        .btn-start {
            background-color: #10b981;
            color: white;
        }
        .btn-start:hover {
            background-color: #059669;
        }
        .btn-stop {
            background-color: #ef4444;
            color: white;
        }
        .btn-stop:hover {
            background-color: #dc2626;
        }
        .btn-close-all {
            background-color: #f59e0b; /* Amber/Orange */
            color: white;
            margin-top: 0.5rem;
        }
        .btn-close-all:hover {
            background-color: #d97706;
        }
        .btn-redeem {
            background-color: #3b82f6; /* Blue */
            color: white;
            margin-top: 0.5rem;
        }
        .btn-redeem:hover {
            background-color: #2563eb;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .status-pending { color: #f59e0b; }
        .status-bought { color: #3b82f6; font-weight: bold; }
        .status-sold { color: #8b5cf6; font-weight: bold; }
        .status-won { color: #10b981; font-weight: bold; }
        .status-lost { color: #ef4444; font-weight: bold; }
        .status-sim { color: #6366f1; font-weight: bold; }
        .sim-row { background-color: #eef2ff; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            width: 100%;
        }
        .market-card {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s;
        }
        .market-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .market-header {
            display: flex;
            justify_content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }
        .market-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #1f2937;
        }
        .countdown {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .price-row {
            display: flex;
            justify_content: space-between;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .price-label {
            color: #666;
        }
        .price-value {
            font-weight: bold;
        }
        .yes-price { color: #10b981; }
        .no-price { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Section: Real-time Markets -->
        <div id="markets-container">
            <h3>实时市场</h3>
            <div id="markets-grid" class="grid-container">
                <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 2rem;">加载中...</div>
            </div>
        </div>

        <!-- Bottom Section: Control & Trades -->
        <div class="bottom-section">
            <div class="control-panel">
                <div style="margin-top: 0.75rem; font-size: 2.0rem; padding-top: 0.5rem; border-top: 1px solid #f0f0f0;">
                    <strong>USDC 余额:</strong> <span id="usdc-balance" style="color: #10b981; font-weight: bold;">加载中...</span>
                </div>
                <div style="margin-top: 0.5rem; font-size: 1.2rem;">
                    <strong>模拟余额:</strong> <span id="sim-balance" style="color: #3b82f6; font-weight: bold;">100.00</span>
                    <button class="btn" style="width: auto; margin-bottom: 0; margin-left: 0.5rem; padding: 0.2rem 0.45rem; font-size: 0.85rem;" onclick="editSimBalance()">修改</button>
                </div>
                <div id="statusText" class="status stopped">检查中...</div>
                <button id="toggleBtn" onclick="toggleBot()" disabled>加载中...</button>
                <button id="closeAllBtn" onclick="closeAllPositions()" class="btn-close-all">一键平仓</button>
                <button id="redeemBtn" onclick="redeemRewards()" class="btn-redeem" style="display: none;">领取奖励</button>

                <div id="lastUpdated" style="margin-top: 1rem; color: #666; font-size: 0.8rem;"></div>
            </div>

            <div id="trades-container">
                <div style="display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;">
                    <div style="display:flex; flex-direction: column; gap: 0.25rem;">
                        <h3 style="margin: 0;">交易统计</h3>
                        <div id="trades-summary" style="color: #666; font-size: 0.85rem;">总:0 | 赢:0 | 输:0 | 当前:-- | 连输:1 | 下单金额:$1.00</div>
                    </div>
                    <button class="btn" style="width: auto; margin-bottom: 0; padding: 0.2rem 0.45rem; font-size: 0.85rem;" onclick="clearTrades()">清空</button>
                </div>
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>市场</th>
                            <th>方向</th>
                            <th>价格</th>
                            <th>数量</th>
                            <th>结果</th>
                            <th>下单倒计时</th>
                            <th>卖出倒计时</th>
                            <th>资金变化</th>
                            <th>余额估算</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="10" style="text-align:center">暂无交易记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 使用当前页面访问的 host 作为 API base，这样无论是 localhost 还是 IP 访问都能正常工作
        const API_BASE = window.location.origin;
        let isRunning = false;
        let lastTradeCount = -1;
        let initialUsdcBalance = null;
        let currentUsdcBalance = null;
        let latestMarketMap = new Map();
        const SIM_BALANCE_KEY = 'pm_sim_balance_v1';
        const SIM_APPLIED_BUYS_KEY = 'pm_sim_applied_buys_v1';
        const SIM_APPLIED_SETTLES_KEY = 'pm_sim_applied_settles_v1';
        const SIM_APPLIED_SELLS_KEY = 'pm_sim_applied_sells_v1';

        function toNumber(v) {
            const n = Number(v);
            return Number.isFinite(n) ? n : null;
        }

        function formatSignedMoney(v) {
            if (!Number.isFinite(v)) return '--';
            const abs = Math.abs(v).toFixed(2);
            return v >= 0 ? `+${abs}` : `-${abs}`;
        }

        function formatMoney(v) {
            if (!Number.isFinite(v)) return '--';
            return v.toFixed(2);
        }

        function getJsonArray(key) {
            try {
                const raw = localStorage.getItem(key);
                if (!raw) return [];
                const v = JSON.parse(raw);
                return Array.isArray(v) ? v : [];
            } catch {
                return [];
            }
        }

        function setJsonArray(key, arr) {
            try {
                localStorage.setItem(key, JSON.stringify(arr));
            } catch {
            }
        }

        function getSimBalance() {
            const raw = localStorage.getItem(SIM_BALANCE_KEY);
            const v = toNumber(raw);
            return v == null ? 100 : v;
        }

        function setSimBalance(v) {
            if (!Number.isFinite(v)) return;
            localStorage.setItem(SIM_BALANCE_KEY, String(v));
            const el = document.getElementById('sim-balance');
            if (el) el.textContent = v.toFixed(2);
        }

        function editSimBalance() {
            const cur = getSimBalance();
            const input = prompt('请输入新的模拟余额（数字）', String(cur));
            if (input == null) return;
            const v = toNumber(input);
            if (v == null) {
                alert('输入无效，请输入数字');
                return;
            }
            setSimBalance(v);
        }

        function initSimBalance() {
            const raw = localStorage.getItem(SIM_BALANCE_KEY);
            if (toNumber(raw) == null) {
                localStorage.setItem(SIM_BALANCE_KEY, '100');
            }
            setSimBalance(getSimBalance());
        }

        function getSimOutcome(trade) {
            const m = latestMarketMap.get(trade.market_id);
            if (!m) return 'win';
            const yp = m.yes_price;
            const np = m.no_price;
            if (trade.side === 'YES') {
                if (yp == null) return 'win';
                if (yp > 0.99) return 'win';
                if (yp < 0.01) return 'lose';
                return null;
            }
            if (trade.side === 'NO') {
                if (np == null) return 'win';
                if (np > 0.99) return 'win';
                if (np < 0.01) return 'lose';
                return null;
            }
            if (trade.side === 'YES') {
                if (yp >= 0.99 && np <= 0.01) return 'win';
                if (yp <= 0.01 && np >= 0.99) return 'lose';
            } else if (trade.side === 'NO') {
                if (np >= 0.99 && yp <= 0.01) return 'win';
                if (np <= 0.01 && yp >= 0.99) return 'lose';
            }
            return null;
        }

        function applySimBalance(trades) {
            const appliedBuys = new Set(getJsonArray(SIM_APPLIED_BUYS_KEY));
            const appliedSettles = new Set(getJsonArray(SIM_APPLIED_SETTLES_KEY));
            const appliedSells = new Set(getJsonArray(SIM_APPLIED_SELLS_KEY));

            let bal = getSimBalance();
            const ordered = [...trades].reverse();

            for (const t of ordered) {
                if (t.status === 'SimBought') {
                    if (!appliedBuys.has(t.id)) {
                        const price = toNumber(t.price);
                        const size = toNumber(t.size);
                        if (price != null && size != null) {
                            bal -= price * size;
                        }
                        appliedBuys.add(t.id);
                    }

                    const outcome = getSimOutcome(t);
                    if (outcome && !appliedSettles.has(t.id)) {
                        const size = toNumber(t.size);
                        if (outcome === 'win' && size != null) {
                            bal += size;
                        }
                        appliedSettles.add(t.id);
                    }
                } else if (t.status === 'SimSold') {
                    if (!appliedSells.has(t.id)) {
                        const price = toNumber(t.price);
                        const size = toNumber(t.size);
                        if (price != null && size != null) {
                            bal += price * size;
                        }
                        appliedSells.add(t.id);
                    }
                }
            }

            setJsonArray(SIM_APPLIED_BUYS_KEY, Array.from(appliedBuys));
            setJsonArray(SIM_APPLIED_SETTLES_KEY, Array.from(appliedSettles));
            setJsonArray(SIM_APPLIED_SELLS_KEY, Array.from(appliedSells));
            setSimBalance(bal);
        }

        async function updateStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                isRunning = data.running;
                render();
            } catch (error) {
                console.error('Error fetching status:', error);
                document.getElementById('statusText').innerText = '连接失败';
                document.getElementById('statusText').className = 'status stopped';
            }
        }

        async function updateTrades() {
            try {
                const response = await fetch(`${API_BASE}/api/trades`);
                const trades = await response.json();
                
                // Check if we need to refresh portfolio
                if (trades.length !== lastTradeCount) {
                    if (lastTradeCount !== -1) {
                        updatePortfolio();
                    }
                    lastTradeCount = trades.length;
                }

                applySimBalance(trades);

                const summaryEl = document.getElementById('trades-summary');
                if (summaryEl) {
                    const pairByMarket = new Map();
                    for (const t of trades) {
                        if (t.status !== 'Bought' && t.status !== 'SimBought' && t.status !== 'Won' && t.status !== 'Lost') continue;
                        const side = t.side;
                        if (side !== 'YES' && side !== 'NO') continue;
                        const price = toNumber(t.price);
                        const size = toNumber(t.size);
                        if (price == null || size == null) continue;
                        const marketId = t.market_id;
                        if (!pairByMarket.has(marketId)) {
                            pairByMarket.set(marketId, { yes: null, no: null, resolved: false });
                        }
                        const entry = pairByMarket.get(marketId);
                        entry.resolved = entry.resolved || t.status === 'Won' || t.status === 'Lost';
                        if (side === 'YES') entry.yes = { price, size, id: t.id };
                        if (side === 'NO') entry.no = { price, size, id: t.id };
                    }

                    let total = 0;
                    let won = 0;
                    let lost = 0;
                    for (const [_mid, v] of pairByMarket) {
                        if (!v.resolved) continue;
                        if (!v.yes || !v.no) continue;
                        const qty = Math.min(v.yes.size, v.no.size, 5);
                        const profit = (1 - (v.yes.price + v.no.price)) * qty;
                        total += 1;
                        if (profit >= 0) won += 1;
                        else lost += 1;
                    }

                    const skipped = trades.filter(t => t.status === 'SimSkipped').length;
                    const posted = trades.filter(t => t.status === 'SimPosted' || t.status === 'BuyPosted').length;
                    const ongoing = Math.max(0, trades.length - skipped - posted - total);

                    const soldTrades = [...trades]
                        .filter(t => t.status === 'Sold' || t.status === 'SimSold')
                        .sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    let currentMarketResult = '--';
                    let marketLoseStreakCount = 1;
                    for (const st of soldTrades) {
                        const p = toNumber(st.profit);
                        if (p == null) continue;
                        if (p >= 0) {
                            currentMarketResult = '赢';
                            marketLoseStreakCount = 1;
                        } else {
                            currentMarketResult = '输';
                            marketLoseStreakCount += 1;
                        }
                    }
                    marketLoseStreakCount = Math.max(1, Math.floor(marketLoseStreakCount) || 1);
                    const buyUsdAmount = Math.max(1, marketLoseStreakCount * 1);
                    summaryEl.textContent = `总:${total} | 赢:${won} | 输:${lost} | 当前:${currentMarketResult} | 连输:${marketLoseStreakCount} | 下单金额:$${buyUsdAmount.toFixed(2)} | 跳过:${skipped} | 挂单中:${posted} | 进行中:${ongoing}`;
                }

                const tbody = document.querySelector('#trades-table tbody');
                
                if (trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">暂无交易记录</td></tr>';
                    return;
                }

                const ordered = [...trades].reverse();
                let cumulativeCashflow = 0;
                const cashflowById = new Map();
                for (const t of ordered) {
                    const price = toNumber(t.price);
                    const size = toNumber(t.size);
                    let cashflow = 0;
                    if (price != null && size != null) {
                        const amount = price * size;
                        if (t.status === 'Bought' || t.status === 'SimBought') {
                            cashflow = -amount;
                        } else if (t.status === 'Sold' || t.status === 'SimSold') {
                            cashflow = amount;
                        }
                    }
                    cumulativeCashflow += cashflow;
                    cashflowById.set(t.id, { cashflow, cumulativeCashflow });
                }

                const pairInfoByMarket = new Map();
                for (const t of trades) {
                    if (t.status !== 'Bought' && t.status !== 'SimBought' && t.status !== 'Won' && t.status !== 'Lost') continue;
                    const side = t.side;
                    if (side !== 'YES' && side !== 'NO') continue;
                    const price = toNumber(t.price);
                    const size = toNumber(t.size);
                    if (price == null || size == null) continue;
                    const marketId = t.market_id;
                    if (!pairInfoByMarket.has(marketId)) {
                        pairInfoByMarket.set(marketId, { yes: null, no: null, resolved: false });
                    }
                    const entry = pairInfoByMarket.get(marketId);
                    entry.resolved = entry.resolved || t.status === 'Won' || t.status === 'Lost';
                    if (side === 'YES') entry.yes = { price, size, id: t.id };
                    if (side === 'NO') entry.no = { price, size, id: t.id };
                }

                tbody.innerHTML = trades.map(trade => {
                    const date = new Date(trade.timestamp * 1000).toLocaleString();
                    let statusClass = 'status-pending';
                    let statusText = '进行中';
                    const isSim = trade.status.startsWith('Sim');
                    if (trade.status === 'Won') {
                        statusClass = 'status-won';
                        statusText = '赢';
                    } else if (trade.status === 'Lost') {
                        statusClass = 'status-lost';
                        statusText = '输';
                    } else if (trade.status === 'SimSkipped') {
                        statusClass = 'status-pending';
                        statusText = '跳过';
                    } else if (trade.status === 'SimPosted' || trade.status === 'BuyPosted') {
                        statusClass = 'status-pending';
                        statusText = '挂单中';
                    } else if (trade.status === 'SimBought') {
                        statusClass = 'status-sim';
                        statusText = '模拟买入';
                    } else if (trade.status === 'SimSold') {
                        statusClass = 'status-sim';
                        statusText = '模拟卖出';
                    }

                    const rowClass = isSim ? 'sim-row' : '';

                    const price = toNumber(trade.price);
                    const size = toNumber(trade.size);
                    const flow = cashflowById.get(trade.id) || { cashflow: 0, cumulativeCashflow: 0 };
                    const cashflow = flow.cashflow;

                    const pair = pairInfoByMarket.get(trade.market_id);
                    let displayPnl = null;
                    if (pair && pair.resolved && pair.yes && pair.no) {
                        const qty = Math.min(pair.yes.size, pair.no.size, 5);
                        const profit = (1 - (pair.yes.price + pair.no.price)) * qty;
                        if (trade.id === pair.yes.id) {
                            displayPnl = profit;
                        } else if (trade.id === pair.no.id) {
                            displayPnl = null;
                        }
                        statusClass = profit >= 0 ? 'status-won' : 'status-lost';
                        statusText = profit >= 0 ? '赢' : '输';
                    } else if (trade.status === 'Sold' || trade.status === 'SimSold') {
                        const p = toNumber(trade.profit);
                        if (p != null) {
                            displayPnl = p;
                            statusClass = p >= 0 ? 'status-won' : 'status-lost';
                            statusText = p >= 0 ? '赢' : '输';
                        }
                    }

                    const estBalance = initialUsdcBalance != null ? initialUsdcBalance + flow.cumulativeCashflow : null;
                    const estBalanceText = initialUsdcBalance != null
                        ? formatMoney(estBalance)
                        : `Δ${formatSignedMoney(flow.cumulativeCashflow)}`;

                    const buyCountdown = trade.buy_countdown || '--';
                    const sellCountdown = trade.sell_countdown || '--';
                    
                    return `
                        <tr class="${rowClass}">
                            <td>${date}</td>
                            <td>${trade.market_slug}</td>
                            <td>${trade.side}</td>
                            <td>${price != null ? price.toFixed(4) : '--'}</td>
                            <td>${size != null ? size.toFixed(2) : '--'}</td>
                            <td class="${statusClass}">${statusText}</td>
                            <td>${buyCountdown}</td>
                            <td>${sellCountdown}</td>
                            <td>${formatSignedMoney(displayPnl != null ? displayPnl : cashflow)}</td>
                            <td>${estBalanceText}</td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error fetching trades:', error);
            }
        }

        async function clearTrades() {
            if (!confirm('确定要清空交易统计日志吗？')) {
                return;
            }
            try {
                await fetch(`${API_BASE}/api/trades/clear`, { method: 'POST' });
            } catch (e) {
                console.error('Error clearing trades:', e);
            }
            lastTradeCount = -1;
            try {
                localStorage.removeItem(SIM_APPLIED_BUYS_KEY);
                localStorage.removeItem(SIM_APPLIED_SETTLES_KEY);
                localStorage.removeItem(SIM_APPLIED_SELLS_KEY);
            } catch {
            }
            const tbody = document.querySelector('#trades-table tbody');
            if (tbody) {
                tbody.innerHTML = '<tr><td colspan="10" style="text-align:center">暂无交易记录</td></tr>';
            }
            updateTrades();
        }

        function render() {
            const statusEl = document.getElementById('statusText');
            const btnEl = document.getElementById('toggleBtn');
            
            if (isRunning) {
                statusEl.innerText = '🟢 真实投注已开启';
                statusEl.className = 'status running';
                btnEl.innerText = '切换为模拟';
                btnEl.className = 'btn-stop';
                btnEl.disabled = false;
            } else {
                statusEl.innerText = '🧪 模拟交易';
                statusEl.className = 'status stopped';
                btnEl.innerText = '开启真实投注';
                btnEl.className = 'btn-start';
                btnEl.disabled = false;
            }
            
            document.getElementById('lastUpdated').innerText = `最后更新: ${new Date().toLocaleTimeString()}`;
        }

        async function toggleBot() {
            const action = isRunning ? 'stop' : 'start';
            const btnEl = document.getElementById('toggleBtn');
            btnEl.disabled = true;
            btnEl.innerText = '处理中...';

            try {
                const response = await fetch(`${API_BASE}/api/control`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action }),
                });
                const data = await response.json();
                isRunning = data.running;
                render();
            } catch (error) {
                console.error('Error toggling bot:', error);
                alert('操作失败，请检查控制台日志');
                btnEl.disabled = false;
            }
        }

        async function closeAllPositions() {
            if (!confirm('确定要平仓所有持仓吗？\n这将以市价卖出所有持仓，但不会暂停Bot。')) {
                return;
            }
            
            const btnEl = document.getElementById('closeAllBtn');
            const originalText = btnEl.innerText;
            btnEl.disabled = true;
            btnEl.innerText = '平仓中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/close_all`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.success) {
                    alert(`平仓操作已触发！\n${data.message}`);
                } else {
                    alert(`平仓失败: ${data.message}`);
                }
            } catch (error) {
                console.error('Error closing positions:', error);
                alert('请求失败，请检查控制台日志');
            } finally {
                btnEl.disabled = false;
                btnEl.innerText = originalText;
                // Update status as it might have been stopped
                updateStatus();
                updatePortfolio();
            }
        }

        async function redeemRewards() {
            if (!confirm('确定要领取奖励吗？\n这将合并所有可合并的持仓（YES+NO）为USDC。')) {
                return;
            }
            
            const btnEl = document.getElementById('redeemBtn');
            const originalText = btnEl.innerText;
            btnEl.disabled = true;
            btnEl.innerText = '领取中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/redeem`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.success) {
                    alert(`领取操作完成！\n${data.message}`);
                } else {
                    alert(`领取失败: ${data.message}`);
                }
            } catch (error) {
                console.error('Error redeeming rewards:', error);
                alert('请求失败，请检查控制台日志');
            } finally {
                btnEl.disabled = false;
                btnEl.innerText = originalText;
                updatePortfolio();
            }
        }

        async function buyMarket(marketId, side) {
            if (!confirm(`确定要买入 ${side} 吗？`)) {
                return;
            }
            try {
                const response = await fetch(`${API_BASE}/api/buy`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ market_id: marketId, side })
                });
                const data = await response.json();
                if (data.success) {
                    alert(`下单成功：${data.order_id || ''}`);
                } else {
                    alert(`下单失败：${data.message || 'unknown error'}`);
                }
            } catch (error) {
                console.error('Error buying:', error);
                alert('请求失败，请检查控制台日志');
            } finally {
                updatePortfolio();
                updateTrades();
            }
        }

        async function updateMarkets() {
            try {
                const response = await fetch(`${API_BASE}/api/markets`);
                const markets = await response.json();
                const grid = document.getElementById('markets-grid');
                latestMarketMap = new Map(markets.map(m => [m.id, m]));
                
                if (markets.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 2rem;">暂无活跃市场数据</div>';
                    return;
                }

                // 按分类分组，每个分类只取一个（最新更新的）
                const marketsByCategory = {};
                markets.forEach(m => {
                    const category = m.category || '其他';
                    if (!marketsByCategory[category]) {
                        marketsByCategory[category] = m;
                    } else {
                        // 如果已存在，比较更新时间，保留最新的
                        if (m.update_time > marketsByCategory[category].update_time) {
                            marketsByCategory[category] = m;
                        }
                    }
                });

                // 转换回数组并排序（可选，按分类名称排序）
                const displayMarkets = Object.values(marketsByCategory).sort((a, b) => a.category.localeCompare(b.category));

                grid.innerHTML = displayMarkets.map(m => `
                    <div class="market-card">
                        <div class="market-header">
                            <div class="market-name">${m.name}</div>
                            <div class="countdown">⏳ ${m.countdown}</div>
                        </div>
                        <div style="margin-bottom: 0.6rem; color: #666; font-size: 0.95rem;">
                            Price to beat: <b>${m.price_to_beat != null ? Math.round(m.price_to_beat).toLocaleString() : '--'}</b>
                        </div>
                        <div class="price-row">
                            <span class="price-label">YES</span>
                            <span class="price-value yes-price">${m.yes_price != null ? m.yes_price.toFixed(4) : '--'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">NO</span>
                            <span class="price-value no-price">${m.no_price != null ? m.no_price.toFixed(4) : '--'}</span>
                        </div>
                        <div style="margin-top: 0.6rem; display: flex; gap: 0.5rem;">
                            <button class="btn" style="flex: 1; padding: 0.35rem 0.5rem;" onclick="buyMarket('${m.id}', 'YES')">买 YES</button>
                            <button class="btn" style="flex: 1; padding: 0.35rem 0.5rem;" onclick="buyMarket('${m.id}', 'NO')">买 NO</button>
                        </div>
                        <div style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.85rem;">
                            <span>总计: <b>${m.sum != null ? m.sum.toFixed(4) : '--'}</b></span>
                            <span>差额: <b>${m.diff != null ? m.diff.toFixed(4) : '--'}</b></span>
                        </div>
                        <div style="font-size: 0.8rem; color: #999; margin-top: 0.5rem; text-align: right;">
                            更新于: ${new Date(m.update_time * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching markets:', error);
            }
        }

        async function updatePortfolio() {
            try {
                const response = await fetch(`${API_BASE}/api/portfolio`);
                const data = await response.json();
                
                // Update Balance
                const balanceElem = document.getElementById('usdc-balance');
                if (balanceElem) {
                    if (data.balance) {
                        const b = toNumber(data.balance);
                        if (b != null) {
                            currentUsdcBalance = b;
                            if (initialUsdcBalance == null) {
                                initialUsdcBalance = b;
                            }
                            balanceElem.textContent = b.toFixed(2);
                        } else {
                            balanceElem.textContent = '---';
                        }
                    } else if (data.error) {
                        balanceElem.textContent = 'Error';
                        console.error('Portfolio Error:', data.error);
                    } else {
                        balanceElem.textContent = '---';
                    }
                }

                // Update Positions
                const tbody = document.getElementById('positions-body');
                if (tbody) {
                    if (!data.positions || data.positions.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="5" style="text-align: center;">无持仓</td></tr>';
                        return;
                    }

                    tbody.innerHTML = data.positions.map(pos => {
                        const curPrice = pos.cur_price || 0;
                        const value = pos.size * curPrice;
                        return `
                            <tr>
                                <td title="${pos.asset}"><small>${pos.asset.substring(0, 6)}...</small></td>
                                <td>${pos.title || 'Unknown'}</td>
                                <td>${parseFloat(pos.size).toFixed(2)}</td>
                                <td>${curPrice > 0 ? parseFloat(curPrice).toFixed(2) : '--'}</td>
                                <td>${value > 0 ? value.toFixed(2) : '--'}</td>
                            </tr>
                        `;
                    }).join('');
                }

            } catch (error) {
                console.error('Error fetching portfolio:', error);
            }
        }

        // Initial load
        initSimBalance();
        updateStatus();
        updateMarkets();
        updateTrades();
        updatePortfolio();
        
        // Auto refresh status every 2 seconds
        setInterval(updateStatus, 2000);
        // Auto refresh trades every 3 seconds
        setInterval(updateTrades, 3000);
        // Auto refresh markets every 5 seconds
        setInterval(updateMarkets, 5000);
        setInterval(updatePortfolio, 5000); // 每5秒更新一次资产
    </script>
</body>
</html>
