<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Polymarket Bot Control</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        /* Top Section: Real-time Markets */
        #markets-container {
            width: 100%;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            box-sizing: border-box;
        }
        
        /* Bottom Section: Split into Left (Control) and Right (Stats) */
        .bottom-section {
            display: flex;
            gap: 20px;
            width: 100%;
            flex-wrap: wrap;
        }
        
        .control-panel {
            flex: 0 0 300px;
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            height: fit-content;
        }
        
        #trades-container {
            flex: 1;
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow-x: auto;
            min-width: 300px;
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            .bottom-section {
                flex-direction: column;
            }
            .control-panel {
                flex: 1;
                width: 100%;
                box-sizing: border-box;
            }
            #trades-container {
                width: 100%;
                box-sizing: border-box;
            }
        }

        h1, h3 {
            margin-top: 0;
            color: #333;
        }
        h1 { margin-bottom: 1.5rem; }
        h3 { margin-bottom: 1rem; border-bottom: 2px solid #f0f0f0; padding-bottom: 0.5rem; }

        .status {
            margin-bottom: 1.5rem;
            font-size: 1.2rem;
            font-weight: bold;
        }
        .status.running {
            color: #10b981;
        }
        .status.stopped {
            color: #ef4444;
        }
        button {
            padding: 12px 24px;
            font-size: 1rem;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
            margin-bottom: 1rem;
        }
        #toggleBtn {
            font-weight: bold;
        }
        .btn-start {
            background-color: #10b981;
            color: white;
        }
        .btn-start:hover {
            background-color: #059669;
        }
        .btn-stop {
            background-color: #ef4444;
            color: white;
        }
        .btn-stop:hover {
            background-color: #dc2626;
        }
        .btn-close-all {
            background-color: #f59e0b; /* Amber/Orange */
            color: white;
            margin-top: 0.5rem;
        }
        .btn-close-all:hover {
            background-color: #d97706;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }
        th, td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f8f9fa;
            font-weight: bold;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        .status-pending { color: #f59e0b; }
        .status-won { color: #10b981; font-weight: bold; }
        .status-lost { color: #ef4444; font-weight: bold; }
        
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 1rem;
            width: 100%;
        }
        .market-card {
            background: #fff;
            padding: 1rem;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
            transition: transform 0.2s;
        }
        .market-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .market-header {
            display: flex;
            justify_content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            border-bottom: 1px solid #f0f0f0;
            padding-bottom: 0.5rem;
        }
        .market-name {
            font-weight: bold;
            font-size: 1.1rem;
            color: #1f2937;
        }
        .countdown {
            background: #e0f2fe;
            color: #0369a1;
            padding: 4px 8px;
            border-radius: 4px;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
        }
        .price-row {
            display: flex;
            justify_content: space-between;
            margin-bottom: 0.5rem;
            font-size: 1.1rem;
        }
        .price-label {
            color: #666;
        }
        .price-value {
            font-weight: bold;
        }
        .yes-price { color: #10b981; }
        .no-price { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Section: Real-time Markets -->
        <div id="markets-container">
            <h3>实时市场</h3>
            <div id="markets-grid" class="grid-container">
                <div style="grid-column: 1/-1; text-align: center; color: #666; padding: 2rem;">加载中...</div>
            </div>
        </div>

        <!-- Bottom Section: Control & Trades -->
        <div class="bottom-section">
            <div class="control-panel">
                <h1>Bot 控制台</h1>
                <div id="statusText" class="status stopped">检查中...</div>
                <button id="toggleBtn" onclick="toggleBot()" disabled>加载中...</button>
                <button id="closeAllBtn" onclick="closeAllPositions()" class="btn-close-all">一键平仓</button>
                <div id="lastUpdated" style="margin-top: 1rem; color: #666; font-size: 0.8rem;"></div>
            </div>

            <div id="trades-container">
                <h3>交易统计</h3>
                <table id="trades-table">
                    <thead>
                        <tr>
                            <th>时间</th>
                            <th>市场</th>
                            <th>方向</th>
                            <th>价格</th>
                            <th>数量</th>
                            <th>结果</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr><td colspan="6" style="text-align:center">暂无交易记录</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 使用当前页面访问的 host 作为 API base，这样无论是 localhost 还是 IP 访问都能正常工作
        const API_BASE = window.location.origin;
        let isRunning = false;

        async function updateStatus() {
            try {
                const response = await fetch(`${API_BASE}/api/status`);
                const data = await response.json();
                isRunning = data.running;
                render();
            } catch (error) {
                console.error('Error fetching status:', error);
                document.getElementById('statusText').innerText = '连接失败';
                document.getElementById('statusText').className = 'status stopped';
            }
        }

        async function updateTrades() {
            try {
                const response = await fetch(`${API_BASE}/api/trades`);
                const trades = await response.json();
                const tbody = document.querySelector('#trades-table tbody');
                
                if (trades.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center">暂无交易记录</td></tr>';
                    return;
                }

                tbody.innerHTML = trades.map(trade => {
                    const date = new Date(trade.timestamp * 1000).toLocaleString();
                    let statusClass = 'status-pending';
                    if (trade.status === 'Won') statusClass = 'status-won';
                    if (trade.status === 'Lost') statusClass = 'status-lost';
                    
                    return `
                        <tr>
                            <td>${date}</td>
                            <td>${trade.market_slug}</td>
                            <td>${trade.side}</td>
                            <td>${trade.price.toFixed(4)}</td>
                            <td>${trade.size.toFixed(2)}</td>
                            <td class="${statusClass}">${trade.status}</td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Error fetching trades:', error);
            }
        }

        function render() {
            const statusEl = document.getElementById('statusText');
            const btnEl = document.getElementById('toggleBtn');
            
            if (isRunning) {
                statusEl.innerText = '🟢 运行中';
                statusEl.className = 'status running';
                btnEl.innerText = '停止 Bot';
                btnEl.className = 'btn-stop';
                btnEl.disabled = false;
            } else {
                statusEl.innerText = '🔴 已停止';
                statusEl.className = 'status stopped';
                btnEl.innerText = '启动 Bot';
                btnEl.className = 'btn-start';
                btnEl.disabled = false;
            }
            
            document.getElementById('lastUpdated').innerText = `最后更新: ${new Date().toLocaleTimeString()}`;
        }

        async function toggleBot() {
            const action = isRunning ? 'stop' : 'start';
            const btnEl = document.getElementById('toggleBtn');
            btnEl.disabled = true;
            btnEl.innerText = '处理中...';

            try {
                const response = await fetch(`${API_BASE}/api/control`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ action }),
                });
                const data = await response.json();
                isRunning = data.running;
                render();
            } catch (error) {
                console.error('Error toggling bot:', error);
                alert('操作失败，请检查控制台日志');
                btnEl.disabled = false;
            }
        }

        async function closeAllPositions() {
            if (!confirm('确定要平仓所有持仓吗？\n这将暂停Bot并以市价卖出所有持仓。')) {
                return;
            }
            
            const btnEl = document.getElementById('closeAllBtn');
            const originalText = btnEl.innerText;
            btnEl.disabled = true;
            btnEl.innerText = '平仓中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/close_all`, {
                    method: 'POST',
                });
                const data = await response.json();
                
                if (data.success) {
                    alert(`平仓操作已触发！\n${data.message}`);
                } else {
                    alert(`平仓失败: ${data.message}`);
                }
            } catch (error) {
                console.error('Error closing positions:', error);
                alert('请求失败，请检查控制台日志');
            } finally {
                btnEl.disabled = false;
                btnEl.innerText = originalText;
                // Update status as it might have been stopped
                updateStatus();
            }
        }

        async function updateMarkets() {
            try {
                const response = await fetch(`${API_BASE}/api/markets`);
                const markets = await response.json();
                const grid = document.getElementById('markets-grid');
                
                if (markets.length === 0) {
                    grid.innerHTML = '<div style="grid-column: 1/-1; text-align: center; color: #666; padding: 2rem;">暂无活跃市场数据</div>';
                    return;
                }

                // 按分类分组，每个分类只取一个（最新更新的）
                const marketsByCategory = {};
                markets.forEach(m => {
                    const category = m.category || '其他';
                    if (!marketsByCategory[category]) {
                        marketsByCategory[category] = m;
                    } else {
                        // 如果已存在，比较更新时间，保留最新的
                        if (m.update_time > marketsByCategory[category].update_time) {
                            marketsByCategory[category] = m;
                        }
                    }
                });

                // 转换回数组并排序（可选，按分类名称排序）
                const displayMarkets = Object.values(marketsByCategory).sort((a, b) => a.category.localeCompare(b.category));

                grid.innerHTML = displayMarkets.map(m => `
                    <div class="market-card">
                        <div class="market-header">
                            <div class="market-name">${m.name}</div>
                            <div class="countdown">⏳ ${m.countdown}</div>
                        </div>
                        <div class="price-row">
                            <span class="price-label">YES</span>
                            <span class="price-value yes-price">${m.yes_price != null ? m.yes_price.toFixed(4) : '--'}</span>
                        </div>
                        <div class="price-row">
                            <span class="price-label">NO</span>
                            <span class="price-value no-price">${m.no_price != null ? m.no_price.toFixed(4) : '--'}</span>
                        </div>
                        <div style="margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #eee; display: flex; justify-content: space-between; font-size: 0.85rem;">
                            <span>Sum: <b>${m.sum != null ? m.sum.toFixed(4) : '--'}</b></span>
                            <span>Diff: <b>${m.diff != null ? m.diff.toFixed(4) : '--'}</b></span>
                        </div>
                        <div style="font-size: 0.8rem; color: #999; margin-top: 0.5rem; text-align: right;">
                            更新于: ${new Date(m.update_time * 1000).toLocaleTimeString()}
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Error fetching markets:', error);
            }
        }

        // Initial load
        updateStatus();
        updateTrades();
        updateMarkets();
        
        // Auto refresh status every 5 seconds
        setInterval(updateStatus, 5000);
        // Auto refresh trades every 5 seconds
        setInterval(updateTrades, 5000);
        // Auto refresh markets every 1 second
        setInterval(updateMarkets, 1000);
    </script>
</body>
</html>
